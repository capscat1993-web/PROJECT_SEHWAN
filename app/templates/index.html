{% extends "base.html" %}
{% block title %}기업 재무정보 - 기업 목록{% endblock %}

{% block content %}
<div class="fade-in">

  <!-- 상단 통계 바 -->
  <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
    <div class="bg-white rounded-xl border border-gray-200 px-5 py-4">
      <div class="text-xs text-gray-400 mb-1">등록 기업</div>
      <div class="text-2xl font-bold text-gray-900" id="statTotal">-</div>
    </div>
    <div class="bg-white rounded-xl border border-gray-200 px-5 py-4">
      <div class="text-xs text-gray-400 mb-1">업종 수</div>
      <div class="text-2xl font-bold text-blue-600" id="statIndustry">-</div>
    </div>
    <div class="bg-white rounded-xl border border-gray-200 px-5 py-4">
      <div class="text-xs text-gray-400 mb-1">최근 보고일</div>
      <div class="text-lg font-bold text-gray-900" id="statLatest">-</div>
    </div>
    <div class="bg-white rounded-xl border border-gray-200 px-5 py-4">
      <div class="text-xs text-gray-400 mb-1">데이터 출처</div>
      <div class="text-sm font-semibold text-gray-700 mt-1">NICE D&amp;B</div>
    </div>
  </div>

  <!-- 검색 + 필터 -->
  <div class="bg-white rounded-xl border border-gray-200 px-5 py-4 mb-4 flex flex-col sm:flex-row gap-3 items-start sm:items-center">
    <div class="relative flex-1 max-w-sm">
      <svg class="absolute left-3 top-2.5 w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
      </svg>
      <input id="searchInput" type="text" placeholder="기업명 검색..."
        class="w-full pl-9 pr-4 py-2 border border-gray-200 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none bg-gray-50">
    </div>
    <div class="text-sm text-gray-400">
      총 <span id="companyCount" class="font-semibold text-gray-700">0</span>개 기업
    </div>
  </div>

  <!-- 기업 테이블 -->
  <div class="bg-white rounded-xl border border-gray-200 overflow-hidden">
    <table class="w-full text-sm">
      <thead>
        <tr class="bg-gray-50 border-b border-gray-200">
          <th class="text-left py-3 px-4 font-semibold text-gray-500 w-8">#</th>
          <th class="text-left py-3 px-4 font-semibold text-gray-500">기업명</th>
          <th class="text-left py-3 px-4 font-semibold text-gray-500 hidden md:table-cell">대표자</th>
          <th class="text-left py-3 px-4 font-semibold text-gray-500 hidden lg:table-cell">업종</th>
          <th class="text-left py-3 px-4 font-semibold text-gray-500 hidden lg:table-cell">주요제품</th>
          <th class="text-left py-3 px-4 font-semibold text-gray-500 hidden md:table-cell">사업자번호</th>
          <th class="text-left py-3 px-4 font-semibold text-gray-500">보고일</th>
        </tr>
      </thead>
      <tbody id="companyTable"></tbody>
    </table>
    <div id="emptyState" class="hidden text-center py-16 text-gray-400">검색 결과가 없습니다.</div>
  </div>

</div>
{% endblock %}

{% block scripts %}
<script>
let allData = [];
let debounceTimer;
const searchInput  = document.getElementById('searchInput');
const companyTable = document.getElementById('companyTable');
const companyCount = document.getElementById('companyCount');
const emptyState   = document.getElementById('emptyState');

async function loadCompanies(q = '') {
  const res  = await fetch(`/api/companies?q=${encodeURIComponent(q)}`);
  const data = await res.json();
  allData = data;
  renderTable(data);
  updateStats(data);
}

function updateStats(data) {
  document.getElementById('statTotal').textContent = data.length;
  const industries = new Set(data.map(c => c.industry).filter(Boolean));
  document.getElementById('statIndustry').textContent = industries.size;
  const dates = data.map(c => c.report_date).filter(Boolean).sort();
  document.getElementById('statLatest').textContent = dates.at(-1) || '-';
}

function renderTable(data) {
  companyCount.textContent = data.length;
  if (data.length === 0) {
    companyTable.innerHTML = '';
    emptyState.classList.remove('hidden');
    return;
  }
  emptyState.classList.add('hidden');

  companyTable.innerHTML = data.map((c, i) => `
    <tr onclick="location.href='/company/${c.id}'"
        class="border-b border-gray-100 hover:bg-blue-50/40 cursor-pointer transition-colors">
      <td class="py-3 px-4 text-gray-300 text-xs">${i + 1}</td>
      <td class="py-3 px-4">
        <div class="flex items-center gap-2.5">
          <div class="w-8 h-8 rounded-lg flex items-center justify-center text-sm font-bold text-white flex-shrink-0"
               style="background:${avatarColor(c.company_name)}">
            ${avatarChar(c.company_name)}
          </div>
          <span class="font-medium text-gray-900">${c.company_name}</span>
        </div>
      </td>
      <td class="py-3 px-4 text-gray-500 hidden md:table-cell">${c.representatives || '-'}</td>
      <td class="py-3 px-4 hidden lg:table-cell">
        ${c.industry
          ? `<span class="inline-block bg-blue-50 text-blue-700 text-xs px-2 py-0.5 rounded-full">${c.industry}</span>`
          : '<span class="text-gray-300">-</span>'}
      </td>
      <td class="py-3 px-4 text-gray-500 text-xs hidden lg:table-cell max-w-[180px] truncate">${c.main_product || '-'}</td>
      <td class="py-3 px-4 text-gray-400 text-xs hidden md:table-cell font-mono">${c.biz_no || '-'}</td>
      <td class="py-3 px-4 text-gray-400 text-xs">${c.report_date || '-'}</td>
    </tr>
  `).join('');
}

function avatarChar(name) {
  const clean = name.replace(/^\(.*?\)/, '').trim();
  return clean.charAt(0) || '?';
}

const COLORS = ['#3b82f6','#8b5cf6','#10b981','#f59e0b','#ef4444','#06b6d4','#84cc16','#f97316'];
function avatarColor(name) {
  let hash = 0;
  for (const c of name) hash = (hash * 31 + c.charCodeAt(0)) & 0xffffffff;
  return COLORS[Math.abs(hash) % COLORS.length];
}

searchInput.addEventListener('input', () => {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(() => loadCompanies(searchInput.value), 300);
});

loadCompanies();
</script>
{% endblock %}
