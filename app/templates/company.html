{% extends "base.html" %}
{% block title %}기업 상세{% endblock %}

{% block content %}
<div class="fade-in">
  <!-- Back -->
  <a href="/" class="inline-flex items-center text-sm text-gray-500 hover:text-blue-600 mb-4">← 목록으로</a>

  <!-- Company header -->
  <div id="companyHeader" class="bg-white rounded-lg border border-gray-200 p-6 mb-6">
    <div class="animate-pulse space-y-2">
      <div class="h-7 bg-gray-200 rounded w-48"></div>
      <div class="h-4 bg-gray-100 rounded w-72"></div>
    </div>
  </div>

  <!-- ★ 핵심 지표 카드 3종 -->
  <div id="keyMetricsSection" class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6"></div>

  <!-- Tabs -->
  <div class="border-b border-gray-200 mb-6">
    <nav class="flex gap-6 -mb-px" id="tabs">
      <button onclick="switchTab('overview')" data-tab="overview" class="py-2 text-sm tab-active">기업 개요</button>
      <button onclick="switchTab('financial')" data-tab="financial" class="py-2 text-sm text-gray-500 hover:text-gray-700">재무제표</button>
      <button onclick="switchTab('health')" data-tab="health" class="py-2 text-sm text-gray-500 hover:text-gray-700">재무건전성</button>
    </nav>
  </div>

  <div id="tab-overview" class="tab-content"></div>
  <div id="tab-financial" class="tab-content hidden"></div>
  <div id="tab-health" class="tab-content hidden"></div>
</div>
{% endblock %}

{% block scripts %}
<script>
const CID = {{ company_id }};
const API_BASE = window.location.origin || '';
let companyData = null;
let healthData = null;
let radarChart = null;
let keyBarCharts = {};

// ─── 유틸 ───────────────────────────────────────────────
function fmtNum(v) {
  if (v === null || v === undefined) return '-';
  return Number(v).toLocaleString('ko-KR');
}
function pctChange(prev, cur) {
  if (!prev || !cur || prev === 0) return null;
  return ((cur - prev) / Math.abs(prev) * 100).toFixed(2);
}
function badgeColor(pct) {
  if (pct === null) return '';
  return pct >= 0 ? 'text-red-500' : 'text-blue-500';
}
function fmtKorean(rawNum, unitStr) {
  if (rawNum === null || rawNum === undefined) return '-';
  const sign = rawNum < 0 ? '-' : '';
  const abs = Math.abs(rawNum);
  const u = (unitStr || '').trim();
  let wonAbs = abs;
  if (u.includes('천원')) wonAbs = abs * 1_000;
  else if (u.includes('백만원') || u.includes('백만')) wonAbs = abs * 1_000_000;
  else if (u.includes('억원') || u.includes('억')) wonAbs = abs * 100_000_000;
  const JO = 1_000_000_000_000, EOK = 100_000_000, MAN = 10_000;
  if (wonAbs >= JO) {
    const jo = Math.floor(wonAbs / JO);
    const eok = Math.floor((wonAbs % JO) / EOK);
    return eok > 0 ? `${sign}${jo.toLocaleString()}조 ${eok.toLocaleString()}억` : `${sign}${jo.toLocaleString()}조`;
  } else if (wonAbs >= EOK) {
    const eok = Math.floor(wonAbs / EOK);
    const man = Math.floor((wonAbs % EOK) / MAN);
    return man > 0 ? `${sign}${eok.toLocaleString()}억 ${man.toLocaleString()}만` : `${sign}${eok.toLocaleString()}억`;
  } else if (wonAbs >= MAN) {
    return `${sign}${Math.floor(wonAbs / MAN).toLocaleString()}만`;
  } else {
    return `${sign}${fmtNum(rawNum)}`;
  }
}

// ─── 탭 전환 ────────────────────────────────────────────
function switchTab(tab) {
  document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
  document.getElementById('tab-' + tab).classList.remove('hidden');
  document.querySelectorAll('#tabs button').forEach(btn => {
    btn.classList.remove('tab-active');
    btn.classList.add('text-gray-500');
  });
  const active = document.querySelector(`[data-tab="${tab}"]`);
  active.classList.add('tab-active');
  active.classList.remove('text-gray-500');

  if (tab === 'financial' && !document.getElementById('tab-financial').dataset.loaded) loadFinancial();
  if (tab === 'health' && !document.getElementById('tab-health').dataset.loaded) loadHealth();
}

// ─── 회사 헤더 + 기업 개요 + 핵심 지표 카드 ────────────
async function loadCompany() {
  const [compRes, kmRes] = await Promise.all([
    fetch(`${API_BASE}/api/companies/${CID}`),
    fetch(`${API_BASE}/api/companies/${CID}/key_metrics`),
  ]);
  companyData = await compRes.json();
  const km = await kmRes.json();

  // 이 기업을 확인했음으로 localStorage에 기록 (목록 NEW 뱃지 제거용)
  try {
    const snapKey = 'cf_company_snapshot';
    const snap = JSON.parse(localStorage.getItem(snapKey) || '{}');
    snap[String(CID)] = companyData.imported_at || '';
    localStorage.setItem(snapKey, JSON.stringify(snap));
  } catch {}

  // 헤더
  document.getElementById('companyHeader').innerHTML = `
    <h1 class="text-2xl font-bold text-gray-900 mb-2">${companyData.company_name}</h1>
    <div class="flex flex-wrap gap-4 text-sm text-gray-600">
      <span>👤 대표: ${companyData.representatives || '-'}</span>
      <span>🏢 사업자번호: ${companyData.biz_no || '-'}</span>
      <span>📅 보고일: ${companyData.report_date || '-'}</span>
      ${companyData.industry ? `<span>🏭 업종: ${companyData.industry}</span>` : ''}
    </div>
  `;

  // 핵심 지표 카드
  const metricColors = {
    '매출액':     { bar: '#4CAF50', label: 'text-green-600' },
    '영업이익':   { bar: '#FF7043', label: 'text-orange-500' },
    '당기순이익': { bar: '#7C3AED', label: 'text-purple-600' },
  };

  const section = document.getElementById('keyMetricsSection');
  section.innerHTML = '';

  for (const [name, data] of Object.entries(km.metrics)) {
    const periods = km.periods.filter(p => data[p] !== null && data[p] !== undefined);
    if (periods.length === 0) continue;

    const latest = periods[periods.length - 1];
    const prev   = periods.length >= 2 ? periods[periods.length - 2] : null;
    const latestVal = data[latest];
    const pct = prev ? pctChange(data[prev], latestVal) : null;
    const color = metricColors[name] || { bar: '#3B82F6', label: 'text-blue-600' };
    const unitLabel = km.unit ? `(${km.unit})` : '';

    const korVal = fmtKorean(latestVal, km.unit);
    const prevVal = prev ? data[prev] : null;
    const prevKorVal = prev ? fmtKorean(prevVal, km.unit) : null;
    const pctColor = pct !== null ? (pct >= 0 ? 'text-red-500' : 'text-blue-500') : '';
    const pctSign = pct !== null && pct >= 0 ? '+' : '';

    const card = document.createElement('div');
    card.className = 'bg-white rounded-lg border border-gray-200 p-5';
    card.innerHTML = `
      <div class="flex items-center justify-between mb-2">
        <span class="text-base font-semibold text-gray-700">${name}</span>
        <span class="text-xs text-gray-400">${latest} 기준</span>
      </div>
      <div class="mb-1 text-xs text-gray-500">
        <span class="font-medium text-gray-700">${latest} ${name}</span>
        ${prev ? `&nbsp;&nbsp;<span class="text-gray-400">${prev} 대비</span>
        ${pct !== null ? `<span class="font-semibold ${pctColor} ml-1">${pctSign}${pct}%</span>` : ''}` : ''}
      </div>
      <div class="text-2xl font-bold ${color.label} mb-3">${korVal}</div>
      <canvas id="kmChart_${name}" height="90"></canvas>
    `;
    section.appendChild(card);

    // 미니 바 차트
    setTimeout(() => {
      const ctx = document.getElementById(`kmChart_${name}`).getContext('2d');
      if (keyBarCharts[name]) keyBarCharts[name].destroy();
      keyBarCharts[name] = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: periods,
          datasets: [{
            data: periods.map(p => data[p]),
            backgroundColor: periods.map((p, i) =>
              i === periods.length - 1 ? color.bar : color.bar + '88'
            ),
            borderRadius: 3,
            borderSkipped: false,
          }]
        },
        options: {
          layout: { padding: { top: 20 } },
          plugins: {
            legend: { display: false },
            tooltip: { callbacks: { label: c => fmtNum(c.raw) + (km.unit ? ` (${km.unit})` : '') } },
            datalabels: {
              anchor: 'end', align: 'end',
              color: ctx => ctx.dataIndex === periods.length - 1 ? color.bar : '#666',
              font: { size: 9, weight: 'bold' },
              formatter: v => v === null ? '' : fmtKorean(v, km.unit),
            },
          },
          scales: {
            x: { grid: { display: false }, ticks: { font: { size: 9 } } },
            y: { display: false },
          },
          animation: { duration: 500 },
        },
        plugins: [ChartDataLabels],
      });
    }, 50);
  }

  // 기업 개요 탭
  loadOverview();
}

async function loadOverview() {
  const secRes = await fetch(`${API_BASE}/api/companies/${CID}/sections`);
  const sections = await secRes.json();
  document.getElementById('tab-overview').innerHTML = `
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
      <div class="bg-white rounded-lg border border-gray-200 p-6">
        <h2 class="text-lg font-semibold mb-4">기업 기본 정보</h2>
        <table class="w-full text-sm">
          <tr class="border-b"><td class="py-2 text-gray-500 w-32">회사명</td><td class="py-2 font-medium">${companyData.company_name}</td></tr>
          <tr class="border-b"><td class="py-2 text-gray-500">대표자</td><td class="py-2">${companyData.representatives || '-'}</td></tr>
          <tr class="border-b"><td class="py-2 text-gray-500">사업자번호</td><td class="py-2">${companyData.biz_no || '-'}</td></tr>
          <tr class="border-b"><td class="py-2 text-gray-500">보고일</td><td class="py-2">${companyData.report_date || '-'}</td></tr>
          <tr class="border-b"><td class="py-2 text-gray-500">업종</td><td class="py-2">${companyData.industry || '-'}</td></tr>
          <tr><td class="py-2 text-gray-500">주요제품</td><td class="py-2">${companyData.main_product || '-'}</td></tr>
        </table>
      </div>
      <div class="bg-white rounded-lg border border-gray-200 p-6">
        <h2 class="text-lg font-semibold mb-4">보유 재무 섹션</h2>
        <div class="flex flex-wrap gap-2">
          ${sections.map(s => `<span class="bg-blue-50 text-blue-700 rounded px-2.5 py-1 text-xs font-medium">${s}</span>`).join('')}
        </div>
      </div>
    </div>
  `;
}

// ─── 재무제표 탭 ─────────────────────────────────────────
async function loadFinancial() {
  const tab = document.getElementById('tab-financial');
  tab.dataset.loaded = '1';
  tab.innerHTML = '<div class="text-center py-12 text-gray-400">로딩 중...</div>';

  const [secRes, chartRes] = await Promise.all([
    fetch(`${API_BASE}/api/companies/${CID}/sections`),
    fetch(`${API_BASE}/api/companies/${CID}/income_chart`),
  ]);
  const sections = await secRes.json();
  const chartData = await chartRes.json();

  tab.innerHTML = `
    <!-- ★ 복합 바 차트 -->
    <div class="bg-white rounded-lg border border-gray-200 p-6 mb-6">
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-lg font-semibold">손익 추이</h2>
        <span class="text-xs text-gray-400"></span>
      </div>
      <canvas id="incomeChart" height="130"></canvas>
    </div>

    <!-- ★ 섹션 탭 + 테이블 -->
    <div class="bg-white rounded-lg border border-gray-200 p-6">
      <div class="flex items-center justify-between mb-4">
        <div class="flex gap-1 flex-wrap" id="sectionTabs"></div>
        <span id="tableUnit" class="text-xs text-gray-400"></span>
      </div>
      <div id="tableContainer" class="overflow-x-auto"></div>
    </div>
  `;

  // 복합 바 차트 그리기
  drawIncomeChart(chartData);

  // 섹션 탭 버튼 생성 (지정된 4개 항목만 표시)
  const ALLOWED_SECTIONS = ['손익계산서', '재무상태표', '자본변동표', '현금흐름분석', '현금흐름지표'];
  const filteredSections = sections.filter(s => ALLOWED_SECTIONS.includes(s));
  const displaySections = filteredSections.length > 0 ? filteredSections : sections;

  const tabsEl = document.getElementById('sectionTabs');
  displaySections.forEach((s, i) => {
    const btn = document.createElement('button');
    btn.textContent = s;
    btn.dataset.section = s;
    btn.className = i === 0
      ? 'px-3 py-1.5 text-xs rounded-md bg-blue-600 text-white font-medium'
      : 'px-3 py-1.5 text-xs rounded-md border border-gray-300 text-gray-600 hover:bg-gray-50';
    btn.onclick = () => {
      tabsEl.querySelectorAll('button').forEach(b => {
        b.className = 'px-3 py-1.5 text-xs rounded-md border border-gray-300 text-gray-600 hover:bg-gray-50';
      });
      btn.className = 'px-3 py-1.5 text-xs rounded-md bg-blue-600 text-white font-medium';
      loadTable(s);
    };
    tabsEl.appendChild(btn);
  });

  if (displaySections.length > 0) loadTable(displaySections[0]);
}

let incomeChart = null;
function drawIncomeChart(data) {
  if (!data.periods || data.periods.length === 0) return;

  const keyMetricNames = ['매출액', '영업이익（손실）', '영업이익(손실)', '영업이익', '당기순이익(손실)', '당기순이익（손실）', '당기순이익'];
  const colorMap = {
    '매출액': '#4CAF50',
    '영업이익（손실）': '#FF7043', '영업이익(손실)': '#FF7043', '영업이익': '#FF7043',
    '당기순이익(손실)': '#7C3AED', '당기순이익（손실）': '#7C3AED', '당기순이익': '#7C3AED',
  };
  const labelMap = {
    '영업이익（손실）': '영업이익', '영업이익(손실)': '영업이익',
    '당기순이익(손실)': '당기순이익', '당기순이익（손실）': '당기순이익',
  };

  const datasets = [];
  for (const row of data.rows) {
    if (!keyMetricNames.includes(row.metric)) continue;
    const values = data.periods.map(p => row.values[p]?.num ?? null);
    datasets.push({
      label: labelMap[row.metric] || row.metric,
      data: values,
      backgroundColor: colorMap[row.metric] || '#3B82F6',
      borderRadius: 4,
      borderSkipped: false,
    });
    if (datasets.length >= 3) break;
  }
  if (datasets.length === 0) return;

  const ctx = document.getElementById('incomeChart').getContext('2d');
  if (incomeChart) incomeChart.destroy();
  incomeChart = new Chart(ctx, {
    type: 'bar',
    data: { labels: data.periods, datasets },
    options: {
      responsive: true,
      layout: { padding: { top: 30, left: 8, right: 8 } },
      plugins: {
        legend: { position: 'bottom', labels: { font: { size: 12 }, boxWidth: 14, padding: 16 } },
        tooltip: { callbacks: { label: c => `${c.dataset.label}: ${fmtKorean(c.raw, data.unit)}` } },
        datalabels: {
          anchor: 'end', align: 'top',
          offset: 2,
          color: ctx => {
            const v = ctx.dataset.data[ctx.dataIndex];
            return v < 0 ? '#ef4444' : '#444';
          },
          font: { size: 11 },
          formatter: v => v === null ? '' : fmtKorean(v, data.unit),
          display: ctx => {
            const v = ctx.dataset.data[ctx.dataIndex];
            return v !== null && v !== 0;
          },
          clamp: true,
        },
      },
      scales: {
        x: { grid: { display: false } },
        y: {
          grid: { color: '#f0f0f0' },
          ticks: { callback: v => fmtKorean(v, data.unit) },
        },
      },
    },
    plugins: [ChartDataLabels],
  });
}

// ─── 섹션별 그룹 헤더 정의 ──────────────────────────────
const SECTION_GROUPS = {
  '재무상태표': [
    { label: '자산', color: 'bg-orange-50 text-orange-700 border-orange-200', trigger: m => /유동자산/.test(m) && !/비유동/.test(m) },
    { label: '부채', color: 'bg-red-50 text-red-700 border-red-200',    trigger: m => /유동부채/.test(m) && !/비유동/.test(m) },
    { label: '자본', color: 'bg-blue-50 text-blue-700 border-blue-200', trigger: m => /^자본금$|납입자본/.test(m) },
  ],
  '현금흐름분석': [
    { label: '영업활동',             color: 'bg-green-50 text-green-700 border-green-200',  trigger: m => /영업활동\s*현금흐름/.test(m) },
    { label: '투자·재무활동 (유입)', color: 'bg-blue-50 text-blue-700 border-blue-200',    trigger: m => /투자.재무활동\s*현금유입/.test(m) },
    { label: '투자·재무활동 (유출)', color: 'bg-red-50 text-red-700 border-red-200',       trigger: m => /투자.재무활동\s*현금유출/.test(m) },
    { label: '현금 변동',            color: 'bg-gray-100 text-gray-700 border-gray-300',   trigger: m => /현금증감액/.test(m) },
  ],
};

// 재무상태표 접기/펼치기 부모 행 정의
const BS_COLLAPSIBLE = [
  {
    key: 'bs_유동자산',
    test: m => /^유동자산$/.test(m.trim()),
    stopAt: m => /비유동자산|자산총계/.test(m),
  },
  {
    key: 'bs_비유동자산',
    test: m => /^비유동자산$/.test(m.trim()),
    stopAt: m => /자산총계|유동부채|부채총계/.test(m),
  },
];

function toggleCollapse(key) {
  const rows = document.querySelectorAll(`tr[data-parent="${key}"]`);
  const btn = document.querySelector(`button[data-toggle="${key}"]`);
  const isCollapsed = rows.length > 0 && rows[0].classList.contains('hidden');
  rows.forEach(r => r.classList.toggle('hidden', !isCollapsed));
  if (btn) btn.textContent = isCollapsed ? '▼' : '▶';
}

async function loadTable(section) {
  const container = document.getElementById('tableContainer');
  container.innerHTML = '<div class="text-center py-8 text-gray-400">로딩 중...</div>';

  const res = await fetch(`${API_BASE}/api/companies/${CID}/financial_table?section=${encodeURIComponent(section)}`);
  const data = await res.json();

  if (!data.rows || data.rows.length === 0) {
    container.innerHTML = '<div class="text-center py-8 text-gray-400">데이터가 없습니다.</div>';
    return;
  }

  // 현금흐름분석: 유출→유입 순서를 유입→유출로 재정렬
  if (section === '현금흐름분석') {
    const rows = data.rows;
    const idxUchul = rows.findIndex(r => /투자.재무활동\s*현금유출/.test(r.metric));
    const idxUip   = rows.findIndex(r => /투자.재무활동\s*현금유입/.test(r.metric));
    if (idxUchul !== -1 && idxUip !== -1 && idxUchul < idxUip) {
      const idxAfter = rows.findIndex((r, i) => i > idxUip && /현금증감액/.test(r.metric));
      const uIpEnd   = idxAfter !== -1 ? idxAfter : rows.length;
      const before    = rows.slice(0, idxUchul);
      const uChulBlock = rows.slice(idxUchul, idxUip);
      const uIpBlock   = rows.slice(idxUip, uIpEnd);
      const after      = rows.slice(uIpEnd);
      data.rows = [...before, ...uIpBlock, ...uChulBlock, ...after];
    }
  }

  const periods = data.periods;
  const unitEl = document.getElementById('tableUnit');
  if (unitEl) unitEl.textContent = data.unit ? `단위: ${data.unit}` : '';

  // 재무상태표: 접기/펼치기 부모-자식 관계 태깅
  const isBS = section === '재무상태표';
  let currentParent = null;
  const taggedRows = data.rows.map(row => {
    if (!isBS) return { ...row, _role: 'normal' };
    const m = row.metric.trim();
    const parentDef = BS_COLLAPSIBLE.find(p => p.test(m));
    if (parentDef) {
      currentParent = parentDef;
      return { ...row, _role: 'parent', _key: parentDef.key };
    }
    if (currentParent && currentParent.stopAt(m)) currentParent = null;
    if (currentParent) return { ...row, _role: 'child', _key: currentParent.key };
    return { ...row, _role: 'normal' };
  });

  const groups = SECTION_GROUPS[section] || [];
  let currentGroup = null;

  let html = `<table class="w-full text-sm border-collapse">
    <thead>
      <tr class="bg-gray-50 border-b-2 border-gray-200">
        <th class="text-left py-2.5 px-3 font-semibold text-gray-600 sticky left-0 bg-gray-50 min-w-[200px]">구분</th>
        ${periods.map(p => `<th class="text-right py-2.5 px-3 font-semibold text-gray-600 min-w-[120px]">${p}</th>`).join('')}
      </tr>
    </thead><tbody>`;

  const CF_HIGHLIGHT = m => {
    const n = m.replace(/\s+/g, '');
    return /영업활동현금흐름/.test(n) || /투자.재무활동현금유출/.test(n) || /현금증감액/.test(n) || /^차액$/.test(n);
  };

  taggedRows.forEach((row, i) => {
    const m = row.metric;
    const mNorm = m.replace(/\s+/g, '');
    const isTotal = /총계|합계|소계/.test(mNorm);
    const isCfHighlight = section === '현금흐름분석' && CF_HIGHLIGHT(m);

    // 그룹 헤더 삽입
    const matchedGroup = groups.find(g => g.trigger(m));
    if (matchedGroup && matchedGroup !== currentGroup) {
      currentGroup = matchedGroup;
      const colSpan = periods.length + 1;
      html += `<tr class="border-b-2 border-t border-gray-200">
        <td colspan="${colSpan}" class="py-2 px-3 ${matchedGroup.color} border-l-4 font-semibold text-xs tracking-wide">
          ${matchedGroup.label} <span class="font-normal opacity-60">[개요]</span>
        </td>
      </tr>`;
    }

    const isChild  = row._role === 'child';
    const isParent = row._role === 'parent';
    const rowBg    = isCfHighlight ? 'bg-gray-100' : (isTotal ? 'bg-blue-50/50' : (isChild ? 'bg-gray-50/60' : (i % 2 === 0 ? 'bg-white' : 'bg-gray-50/40')));
    const fontClass = isCfHighlight ? 'font-semibold text-gray-900' : (isTotal ? 'font-semibold text-gray-900' : 'text-gray-700');
    const indent    = isChild ? 'pl-10' : ((!isTotal && currentGroup) ? 'pl-6' : 'px-3');
    const trAttrs   = isChild ? `data-parent="${row._key}"` : '';
    const hiddenCls = isChild ? 'hidden' : '';

    // 부모 행: 토글 버튼 포함
    let metricCell;
    if (isParent) {
      metricCell = `<button onclick="toggleCollapse('${row._key}')" data-toggle="${row._key}"
        class="mr-1.5 w-4 h-4 inline-flex items-center justify-center text-orange-500 hover:text-orange-700 text-xs">▶</button>${m}`;
    } else {
      metricCell = (isChild ? '<span class="mr-1.5 text-gray-300 text-xs">└</span>' : '') + m;
    }

    const trHighlightCls = isCfHighlight ? 'border-l-4 border-l-gray-400' : '';
    html += `<tr ${trAttrs} class="${hiddenCls} ${rowBg} hover:bg-blue-50/30 border-b border-gray-100 ${trHighlightCls}">
      <td class="py-1.5 ${indent} sticky left-0 ${rowBg} ${fontClass}">${metricCell}</td>`;
    periods.forEach(p => {
      const val = row.values[p];
      const numColor = val?.num < 0 ? 'text-red-500' : '';
      html += `<td class="py-1.5 px-3 text-right ${fontClass} ${numColor}">${val?.raw || '-'}</td>`;
    });
    html += '</tr>';
  });

  html += '</tbody></table>';
  container.innerHTML = html;
}

// ─── 재무건전성 탭 ───────────────────────────────────────
async function loadHealth() {
  const tab = document.getElementById('tab-health');
  tab.dataset.loaded = '1';
  tab.innerHTML = '<div class="text-center py-12 text-gray-400">분석 중...</div>';

  try {
    const res = await fetch(`${API_BASE}/api/companies/${CID}/health`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    healthData = await res.json();
  } catch (e) {
    tab.dataset.loaded = '';
    tab.innerHTML = `<div class="text-center py-8 text-red-400">데이터를 불러오지 못했습니다. (${e.message})<br><span class="text-sm text-gray-400 cursor-pointer underline" onclick="switchTab('health')">다시 시도</span></div>`;
    return;
  }

  if (healthData.error) {
    tab.innerHTML = `<div class="text-center py-8 text-gray-400">${healthData.error}</div>`;
    return;
  }

  try {

  // ── 등급별 색상 매핑 ──────────────────────────────────────
  const gradeStyle = {
    'AAA': { badge: 'bg-emerald-100 text-emerald-800 border-emerald-300', bar: '#10b981' },
    'AA':  { badge: 'bg-green-100 text-green-800 border-green-300',       bar: '#22c55e' },
    'A':   { badge: 'bg-blue-100 text-blue-800 border-blue-300',          bar: '#3b82f6' },
    'BBB': { badge: 'bg-yellow-100 text-yellow-800 border-yellow-300',    bar: '#eab308' },
    'BB':  { badge: 'bg-orange-100 text-orange-800 border-orange-300',    bar: '#f97316' },
    'B':   { badge: 'bg-red-100 text-red-800 border-red-300',             bar: '#ef4444' },
  };
  const gs = gradeStyle[healthData.grade] || { badge: 'bg-gray-100 text-gray-700 border-gray-300', bar: '#6b7280' };

  const itemGradeColor = {
    'A (양호)': 'text-emerald-600', 'B (보통)': 'text-blue-600',
    'C (주의)': 'text-yellow-600',  'D (위험)': 'text-red-600', 'N/A': 'text-gray-400',
  };

  const domainColors = ['#3b82f6','#8b5cf6','#10b981','#f59e0b','#ef4444'];
  const healthNotesHtml = [healthData.grade_note, healthData.data_note]
    .filter(Boolean)
    .map(note => `
      <div class="rounded-lg border border-amber-200 bg-amber-50 px-3 py-2 text-xs text-amber-800">
        ${note}
      </div>
    `)
    .join('');
  const healthOpinionHtml = (healthData.evaluation_opinion_lines || [])
    .map(line => `<p class="text-sm leading-6 text-gray-700">${line}</p>`)
    .join('');

  // ── 영역별 레이더 라벨·값 ─────────────────────────────────
  const radarLabels = healthData.domains.map(d => `${d.name}\n(${d.score}/${d.max_score})`);
  const radarValues = healthData.domains.map(d =>
    d.max_score > 0 ? Math.round(d.score / d.max_score * 100) : 0
  );

  // ── HTML 렌더링 ───────────────────────────────────────────
  tab.innerHTML = `
    <!-- 다운로드 버튼 -->
    <div class="flex justify-end mb-3">
      <a href="${API_BASE}/api/export-health/${CID}"
         class="inline-flex items-center gap-1.5 px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium rounded-lg transition-colors shadow-sm">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
        </svg>
        Excel 다운로드
      </a>
    </div>

    <!-- 종합 요약 카드 -->
    <div class="bg-white rounded-xl border border-gray-200 p-6 mb-6">
      <div class="flex flex-col sm:flex-row items-start sm:items-center gap-4">
        <div class="text-center min-w-[5rem]">
          <div class="inline-flex items-center justify-center w-20 h-20 rounded-full border-2 ${gs.badge} text-3xl font-bold">
            ${healthData.grade}
          </div>
          <div class="mt-1 text-xs text-gray-400">${healthData.period} 기준</div>
        </div>
        <div class="flex-1 min-w-0">
          <div class="flex items-baseline gap-2 mb-1">
            <span class="text-2xl font-bold text-gray-900">${healthData.total_score}점</span>
            <span class="text-sm text-gray-400">/ 100점</span>
          </div>
          <div class="text-sm font-medium text-gray-700 mb-3">${healthData.recommendation}</div>
          ${healthNotesHtml ? `<div class="space-y-2 mb-3">${healthNotesHtml}</div>` : ''}
          <div class="w-full bg-gray-100 rounded-full h-2.5">
            <div class="h-2.5 rounded-full transition-all duration-700"
                 style="width:${healthData.total_score}%; background:${gs.bar}"></div>
          </div>
        </div>
        <div class="hidden md:block text-xs text-gray-400 space-y-0.5 shrink-0">
          <div><span class="font-semibold text-emerald-600">AAA</span> 85점↑ 최우량</div>
          <div><span class="font-semibold text-green-600">AA</span>&nbsp; 75점↑ 우량</div>
          <div><span class="font-semibold text-blue-600">A</span>&nbsp;&nbsp;&nbsp; 65점↑ 양호</div>
          <div><span class="font-semibold text-yellow-600">BBB</span> 55점↑ 보통</div>
          <div><span class="font-semibold text-orange-500">BB</span>&nbsp; 45점↑ 주의</div>
          <div><span class="font-semibold text-red-600">B</span>&nbsp;&nbsp;&nbsp; 44점↓ 위험</div>
        </div>
      </div>
    </div>

    <!-- 레이더 차트 + 영역별 점수 바 -->
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-6">
      <div class="bg-white rounded-xl border border-gray-200 p-6">
        <h3 class="text-base font-semibold text-gray-700 mb-4">영역별 건전성</h3>
        <div class="flex justify-center"><canvas id="radarCanvas" width="300" height="300"></canvas></div>
      </div>
      <div class="bg-white rounded-xl border border-gray-200 p-6">
        <h3 class="text-base font-semibold text-gray-700 mb-4">영역별 점수</h3>
        <div class="space-y-4" id="domainBars"></div>
      </div>
    </div>

    <!-- 세부 지표 테이블 -->
    <div class="bg-white rounded-xl border border-gray-200 p-6">
      <h3 class="text-base font-semibold text-gray-700 mb-4">세부 지표</h3>
      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead>
            <tr class="border-b-2 border-gray-200 bg-gray-50">
              <th class="text-left py-2.5 px-3 font-semibold text-gray-500">영역</th>
              <th class="text-left py-2.5 px-3 font-semibold text-gray-500">지표</th>
              <th class="text-right py-2.5 px-3 font-semibold text-gray-500">값</th>
              <th class="text-center py-2.5 px-3 font-semibold text-gray-500">벤치마크</th>
              <th class="text-center py-2.5 px-3 font-semibold text-gray-500">점수</th>
              <th class="text-center py-2.5 px-3 font-semibold text-gray-500">등급</th>
            </tr>
          </thead>
          <tbody id="healthTableBody"></tbody>
        </table>
      </div>
    </div>

    <div class="bg-white rounded-xl border border-gray-200 p-6 mt-6">
      <h3 class="text-base font-semibold text-gray-700 mb-3">평가의견</h3>
      <div class="space-y-2">
        ${healthOpinionHtml}
      </div>
    </div>
  `;

  // ── 영역별 점수 바 렌더링 ─────────────────────────────────
  const barsEl = document.getElementById('domainBars');
  healthData.domains.forEach((d, i) => {
    const pct = d.max_score > 0 ? Math.round(d.score / d.max_score * 100) : 0;
    const color = domainColors[i] || '#6b7280';
    const scoreLabel = d.max_score > 0 ? `${d.score} / ${d.max_score}점` : '평가 제외';
    barsEl.innerHTML += `
      <div>
        <div class="flex justify-between text-xs text-gray-600 mb-1">
          <span class="font-medium">${d.name}</span>
          <span>${scoreLabel}</span>
        </div>
        <div class="w-full bg-gray-100 rounded-full h-3">
          <div class="h-3 rounded-full transition-all duration-700"
               style="width:${pct}%; background:${color}"></div>
        </div>
      </div>
    `;
  });

  // ── 세부 테이블 렌더링 ────────────────────────────────────
  const tbody = document.getElementById('healthTableBody');
  healthData.domains.forEach(d => {
    d.items.forEach((item, idx) => {
      const gc = itemGradeColor[item.item_grade] || 'text-gray-500';
      const scoreColor = item.max_score === 0
        ? 'text-gray-400'
        : item.score === item.max_score
        ? 'text-emerald-600 font-bold'
        : item.score === 0
          ? 'text-red-500'
          : 'text-gray-700';
      const scoreDisplay = item.max_score > 0
        ? `${item.score}<span class="text-gray-300 text-xs">/${item.max_score}</span>`
        : '<span class="text-gray-400 text-xs">평가 제외</span>';
      const domainCell = idx === 0
        ? `<td class="py-2.5 px-3 font-medium text-gray-700 align-top" rowspan="${d.items.length}">${d.name}</td>`
        : '';
      const valDisplay = item.value !== null
        ? `${item.value.toLocaleString('ko-KR')}${item.unit}`
        : '-';
      tbody.innerHTML += `
        <tr class="border-b border-gray-100 hover:bg-gray-50/50">
          ${domainCell}
          <td class="py-2.5 px-3 text-gray-700">${item.label}</td>
          <td class="py-2.5 px-3 text-right font-mono text-gray-800">${valDisplay}</td>
          <td class="py-2.5 px-3 text-center text-gray-400 text-xs">${item.benchmark}</td>
          <td class="py-2.5 px-3 text-center ${scoreColor}">${scoreDisplay}</td>
          <td class="py-2.5 px-3 text-center text-xs font-medium ${gc}">${item.item_grade}</td>
        </tr>
      `;
    });
  });

  // ── 레이더 차트 ──────────────────────────────────────────
  const ctx = document.getElementById('radarCanvas').getContext('2d');
  if (radarChart) radarChart.destroy();
  radarChart = new Chart(ctx, {
    type: 'radar',
    data: {
      labels: radarLabels,
      datasets: [{
        label: '건전성 점수(%)',
        data: radarValues,
        backgroundColor: 'rgba(59,130,246,0.15)',
        borderColor: 'rgba(59,130,246,0.8)',
        pointBackgroundColor: domainColors,
        pointRadius: 5,
        borderWidth: 2,
      }]
    },
    options: {
      scales: {
        r: {
          beginAtZero: true, max: 100, min: 0,
          ticks: { stepSize: 25, font: { size: 9 }, display: false },
          pointLabels: { font: { size: 11 } },
          grid: { color: 'rgba(0,0,0,0.08)' },
        }
      },
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: c => `${c.raw}% 달성` } },
      },
    }
  });
  } catch (e) {
    tab.dataset.loaded = '';
    tab.innerHTML = `<div class="text-center py-8 text-red-400">화면 렌더링 중 오류가 발생했습니다. (${e.message})<br><span class="text-sm text-gray-400 cursor-pointer underline" onclick="switchTab('health')">다시 시도</span></div>`;
  }
}

loadCompany();
</script>
