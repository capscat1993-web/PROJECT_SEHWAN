services:
  - type: web
    name: financial-report
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: DB_PATH
        value: /opt/render/project/src/reports.db
    plan: free
