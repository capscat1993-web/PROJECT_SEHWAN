services:
  - type: web
    name: financial-report-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: cd backend && gunicorn config.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: DB_PATH
        value: /opt/render/project/src/data/reports.db
      - key: CORS_ORIGINS
        sync: false
      - key: DJANGO_ALLOWED_HOSTS
        value: "*"
    plan: free
